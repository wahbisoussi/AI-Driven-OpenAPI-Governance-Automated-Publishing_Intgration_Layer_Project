openapi: 3.0.1
info:
  title: BIAT Retail Banking - Accounts API
  description: Professional API for managing customer bank accounts and transactions.
  version: 2026-03-03 # Microsoft standard YYYY-MM-DD
  contact:
    name: BIAT IT Support
    email: api-support@biat.com.tn

servers:
  - url: https://api.biat.com.tn/v1
    description: Production Server

paths:
  /account-details/{accountId}:
    get:
      tags:
        - Accounts
      summary: Retrieves specific account details
      operationId: Accounts_GetDetails
      security:
        - OAuth2: [read]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier for the bank account.
      responses:
        '200':
          description: Successful account retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid Request
        default:
          description: Unexpected error handler.

  /accounts/transfers:
    post:
      tags:
        - Transactions
      summary: Create a money transfer between accounts
      operationId: Transactions_CreateTransfer
      security:
        - OAuth2: [write]
      requestBody:
        description: Required data for the fund transfer.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transfer created successfully
        '400':
          description: Bad request
        default:
          description: An unexpected error occurred.

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: "Standard OAuth2 flow for BIAT internal banking services."
      flows:
        clientCredentials:
          tokenUrl: https://api.biat.com.tn/token
          scopes:
            read: Read account data
            write: Perform transfers

  schemas:
    Account:
      type: object
      title: Account
      description: Representation of a customer bank account.
      properties:
        accountId:
          type: string
          description: Unique ID of the account.
        accountType:
          type: string
          enum: [SAVINGS, CHECKING, LOAN]
          description: The category of account.
        balance:
          type: number
          description: Current available balance.
        currency:
          type: string
          default: TND
          description: ISO currency code.

    TransferRequest:
      type: object
      title: TransferRequest
      description: "Data required to initiate a fund transfer."
      properties:
        sourceAccount:
          type: string
          description: "The unique identifier for the source bank account."
        destinationAccount:
          type: string
          description: "The unique identifier for the recipient bank account."
        amount:
          type: number
          description: "The total amount to be transferred in TND."