rules:
  no-http:
    description: "Security: All servers must use HTTPS."
    severity: "error"
    given: "$.servers[*].url"
    then:
      function: "pattern"
      functionOptions:
        notMatch: "^http://"
  
  require-security-schemes:
    description: "Security: Every path must have a security declaration."
    severity: "error"
    given: "$.paths[*][*]"
    then:
      field: "security"
      function: "truthy"

  no-api-key-in-query:
    description: "Security: API keys should not be passed in query parameters."
    severity: "error"
    given: "$.paths[*].get.parameters[*]"
    then:
      field: "name"
      function: "pattern"
      functionOptions:
        notMatch: "/(api_key|apikey|auth_key)/"