# app/core/rulesets/microsoft-standard.yaml
extends: 
  - spectral:oas
  - https://raw.githubusercontent.com/azure/azure-api-style-guide/main/spectral.yaml
rules:
  # We enforce kebab-case strictly for BIAT
  ms-path-kebab-case:
    description: "Paths must be lowercase kebab-case."
    message: "{{property}} is not in a valid kebab-case format."
    severity: error
    given: "$.paths[*]~"
    then:
      function: pattern
      functionOptions:
        # This checks for the kebab-case part and IGNORES the {parameters} 
        # by checking only the static parts of the path.
        match: "^(/[a-z0-9-]*|/\\{[a-zA-Z0-9]+\\})+$"