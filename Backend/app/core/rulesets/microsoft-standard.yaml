extends: 
  - "spectral:oas"
  - "https://raw.githubusercontent.com/azure/azure-api-style-guide/main/spectral.yaml"

rules:
  biat-version-format:
    description: "Version must be in YYYY-MM-DD format."
    severity: "error"
    given: "$.info.version"
    then:
      function: "pattern"
      functionOptions:
        match: "^\\d{4}-\\d{2}-\\d{2}$"

  property-case-camel:
    description: "All properties must be camelCase."
    severity: "error"
    given: "$.components.schemas[*].properties[*]~"
    then:
      function: "casing"
      functionOptions:
        type: "camel"

  no-generic-paths:
    description: "Paths should not be generic (e.g., /test, /data)."
    severity: "warn"
    given: "$.paths[*]~"
    then:
      function: "pattern"
      functionOptions:
        notMatch: "/(test|data|sample|temp)/"