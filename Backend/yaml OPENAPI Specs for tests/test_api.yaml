openapi: 3.0.3
info:
  title: "BIAT Customer Integration API"
  description: "Standardized API for retrieving customer financial summaries. Part of the AI-Governance PFE."
  contact:
    name: "IT Integration Team"
    email: "pfe-support@biat.com.tn"
  version: "1.0.0"

servers:
  - url: "https://api-dev.biat.tn/v1"
    description: "Development Server"

paths:
  /customers/{customerId}/balance:
    get:
      tags:
        - Financials
      summary: "Get account balance"
      description: "Retrieves the current balance for a specific customer account."
      parameters:
        - name: "customerId"
          in: path
          required: true
          description: "Unique ID of the customer"
          schema:
            type: string
            example: "CUST-98765"
      responses:
        '200':
          description: "Successful operation"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '401':
          description: "Unauthorized - Missing or invalid token"
        '404':
          description: "Customer not found"

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: "https://localhost:9443/oauth2/token"
          scopes: {}
  schemas:
    BalanceResponse:
      type: object
      properties:
        account_id:
          type: string
        currency:
          type: string
          example: "TND"
        amount:
          type: number
          format: float
          example: 1540.500
        timestamp:
          type: string
          format: date-time

security:
  - OAuth2: []