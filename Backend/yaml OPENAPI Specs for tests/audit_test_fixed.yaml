openapi: 3.0.1
info:
  title: BIAT Final Success Demo  # New title for a fresh start
  description: Professional API for managing customer bank accounts and transactions.
  version: 2026-04-22 # Fix: Now follows the YYYY-MM-DD format required by your rules
  contact:
    name: BIAT IT Support
    email: api-support@biat.com.tn

servers:
  - url: https://api.biat.com.tn/v1
    description: Production Server

paths:
  /account-details/{accountId}: # Trap: AI will refactor this to /account/{accountId}
    get:
      tags:
        - Accounts
      summary: Retrieves specific account details
      operationId: Accounts_GetDetails
      security:
        - OAuth2: [read_pfe_success] # Unique scope name
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier for the bank account.
      responses:
        '200':
          description: Successful account retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid Request

  /accounts/transfers:
    post:
      tags:
        - Transactions
      summary: Create a money transfer between accounts
      operationId: Transactions_CreateTransfer
      security:
        - OAuth2: [write_pfe_success] # Unique scope name
      requestBody:
        description: Required data for the fund transfer.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '201':
          description: Transfer created successfully

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: "Standard OAuth2 flow for BIAT internal banking services."
      flows:
        clientCredentials:
          tokenUrl: https://api.biat.com.tn/token
          scopes:
            read_pfe_success: Read account data
            write_pfe_success: Perform transfers

  schemas:
    Account:
      type: object
      title: Account
      properties:
        accountId: { type: string }
        accountType: { type: string, enum: [SAVINGS, CHECKING, LOAN] }
        balance: { type: number }
        currency: { type: string, default: TND }

    TransferRequest:
      type: object
      title: TransferRequest
      properties:
        sourceAccount: { type: string }
        destinationAccount: { type: string }
        amount: { type: number }