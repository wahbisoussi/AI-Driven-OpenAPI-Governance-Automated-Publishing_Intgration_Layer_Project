openapi: 3.0.1
info:
  title: BIAT Core Accounts API
  description: Official enterprise API for managing retail banking account resources.
  version: 2026-03-06
  contact:
    name: BIAT Architecture Team
    email: architecture-support@biat.com.tn
servers:
  - url: https://api.biat.com.tn/v1
    description: Production Environment
paths:
  /accounts/{accountId}:
    get:
      summary: Retrieve detailed account information
      operationId: accounts_get_details
      security:
        - OAuth2: [read:accounts]
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful account retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Invalid request parameters
        '401':
          description: Unauthorized access
        '404':
          description: Account not found
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://api.biat.com.tn/oauth/token
          scopes:
            read:accounts: Read account data
  schemas:
    Account:
      type: object
      required:
        - accountId
        - balance
      properties:
        accountId:
          type: string
          format: uuid
        balance:
          type: number
          format: double
        currencyCode:
          type: string
          minLength: 3
          maxLength: 3