services:
  db:
    image: pgvector/pgvector:pg15
    container_name: api_governance_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: api_governance_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: api_governance_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped 

  backend:
    build: ./Backend
    container_name: api_governance_backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env 
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@db:5432/api_governance_db
      - OLLAMA_URL=http://ollama:11434
      - WSO2_CLIENT_ID=9NM3RiuUjzyNu7IMmufPDqbdAmEa
      - WSO2_CLIENT_SECRET=DR2Icc26QNnVgolFsUCRyX5dKkca
      - JWT_SECRET_KEY=biat-jwt-secret-gov-2025-secure
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build: ./Frontend/Frontend_Biat_Dashboard/vite
    container_name: api_governance_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: api_governance_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: api_governance_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=biat2025
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ollama_data:
  db_data:
  grafana_data: