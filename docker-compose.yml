services:
  db:
    image: pgvector/pgvector:pg15
    container_name: api_governance_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: api_governance_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: api_governance_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped 

  backend:
    build: ./Backend
    container_name: api_governance_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:admin123@db:5432/api_governance_db
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      db:
        condition: service_started
      ollama:
        condition: service_started

volumes:
  ollama_data:
  db_data: